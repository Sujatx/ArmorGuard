services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    # NOTE: server is NOT run in privileged mode by default.
    # Open Question: Will Nmap raw sockets require privileged: true in this container?
    # Non-privileged TCP connect scans (-sT) may cover the target without root privileges,
    # so we keep this disabled until testing determines if it is required.
    # privileged: true
    networks:
      - armorguard-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      # For a build stage Dockerfile, we will use custom Dockerfile or basic setup.
      # To run it in dev mode, we can build a simple node runner.
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    networks:
      - armorguard-net

  demo-target:
    build:
      context: ./demo-target
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    networks:
      - armorguard-net

networks:
  armorguard-net:
    driver: bridge
