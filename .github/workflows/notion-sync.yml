name: Notion Task Sync

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ github.event.action }}" = "opened" ] || [ "${{ github.event.action }}" = "reopened" ]; then
            echo "status=In-review" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            echo "status=Merged" >> $GITHUB_OUTPUT
          else
            echo "status=Not Started" >> $GITHUB_OUTPUT
          fi

      - name: Update Notion status by branch name
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: "9f871d4856ef446aa60d50ce092dd205"
          BRANCH: ${{ github.head_ref }}
          STATUS: ${{ steps.status.outputs.status }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request, urllib.error

          token = os.environ.get("NOTION_TOKEN", "")
          if not token:
            print("Token is empty!")
            exit(1)

          db_id = os.environ["NOTION_DATABASE_ID"]
          branch = os.environ["BRANCH"]
          status = os.environ["STATUS"]

          auth = "Bearer " + token
          headers = {
            "Authorization": auth,
            "Notion-Version": "2022-06-28",
            "Content-Type": "application/json"
          }

          print(f"Branch: {branch}")
          print(f"Status: {status}")
          print(f"DB ID: {db_id}")

          payload = json.dumps({
            "filter": {
              "property": "Branch",
              "rich_text": { "equals": branch }
            }
          }).encode()

          try:
            req = urllib.request.Request(
              f"https://api.notion.com/v1/databases/{db_id}/query",
              data=payload, headers=headers, method="POST"
            )
            response = urllib.request.urlopen(req)
            results = json.loads(response.read())["results"]

            if not results:
              print(f"No row found for branch: {branch}")
              exit(1)

            page_id = results[0]["id"]

            update_payload = json.dumps({
              "properties": {
                "Status": {
                  "select": { "name": status }
                }
              }
            }).encode()

            req2 = urllib.request.Request(
              f"https://api.notion.com/v1/pages/{page_id}",
              data=update_payload, headers=headers, method="PATCH"
            )
            urllib.request.urlopen(req2)
            print(f"Updated '{branch}' -> {status}")

          except urllib.error.HTTPError as e:
            print(f"HTTP Error {e.code}: {e.reason}")
            print(f"Response body: {e.read().decode()}")
            exit(1)
          EOF