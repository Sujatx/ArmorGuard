name: Notion Task Sync

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ github.event.action }}" = "opened" ] || [ "${{ github.event.action }}" = "reopened" ]; then
            echo "status=In-review" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            echo "status=Merged" >> $GITHUB_OUTPUT
          else
            echo "status=Not Started" >> $GITHUB_OUTPUT
          fi

      - name: Write token to file
        run: echo "${{ secrets.NOTION_API_KEY }}" > /tmp/notion_token.txt

      - name: Update Notion status and log PR
        env:
          NOTION_DATABASE_ID: "9f871d4856ef446aa60d50ce092dd205"
          BRANCH: ${{ github.head_ref }}
          STATUS: ${{ steps.status.outputs.status }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_ACTION: ${{ github.event.action }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request, urllib.error

          with open("/tmp/notion_token.txt") as f:
            token = f.read().strip()

          db_id = os.environ["NOTION_DATABASE_ID"]
          branch = os.environ["BRANCH"]
          status = os.environ["STATUS"]
          pr_number = os.environ["PR_NUMBER"]
          pr_title = os.environ["PR_TITLE"]
          pr_user = os.environ["PR_USER"]
          pr_url = os.environ["PR_URL"]
          pr_action = os.environ["PR_ACTION"]

          headers = {
            "Authorization": "Bearer " + token,
            "Notion-Version": "2022-06-28",
            "Content-Type": "application/json"
          }

          print(f"Branch: {branch}, Status: {status}, PR: #{pr_number} ({pr_user})")

          # Find row by branch
          payload = json.dumps({
            "filter": {
              "property": "Branch",
              "rich_text": { "equals": branch }
            }
          }).encode()

          try:
            req = urllib.request.Request(
              f"https://api.notion.com/v1/databases/{db_id}/query",
              data=payload, headers=headers, method="POST"
            )
            results = json.loads(urllib.request.urlopen(req).read())["results"]

            if not results:
              print(f"No row found for branch: {branch}")
              exit(1)

            page = results[0]
            page_id = page["id"]
            print(f"Found page: {page_id}")

            # Get existing rich text array from PRs cell
            existing_rt = []
            try:
              pr_prop = page["properties"].get("PRs", {})
              existing_rt = pr_prop.get("rich_text", [])
            except:
              pass

            # Only append on opened/reopened
            if pr_action in ["opened", "reopened"]:
              # Add separator if there are existing entries
              if existing_rt:
                existing_rt.append({
                  "text": { "content": "  →  " }
                })

              # Add new PR as a clickable link
              existing_rt.append({
                "text": {
                  "content": f"#{pr_number} {pr_title} ({pr_user})",
                  "link": { "url": pr_url }
                }
              })

            # Update status + PRs cell
            update_payload = json.dumps({
              "properties": {
                "Status": { "status": { "name": status } },
                "PRs": { "rich_text": existing_rt }
              }
            }).encode()

            req2 = urllib.request.Request(
              f"https://api.notion.com/v1/pages/{page_id}",
              data=update_payload, headers=headers, method="PATCH"
            )
            urllib.request.urlopen(req2)
            print(f"Done: {branch} -> {status}")

          except urllib.error.HTTPError as e:
            print(f"HTTP Error {e.code}: {e.reason}")
            print(f"Response: {e.read().decode()}")
            exit(1)
          EOF
