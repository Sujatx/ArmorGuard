name: Notion Task Sync

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ github.event.action }}" = "opened" ] || [ "${{ github.event.action }}" = "reopened" ]; then
            echo "status=In-review" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            echo "status=Merged" >> $GITHUB_OUTPUT
          else
            echo "status=Not Started" >> $GITHUB_OUTPUT
          fi

      - name: Update Notion status by branch name
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: "9f871d4856ef446aa60d50ce092dd205"
          BRANCH: ${{ github.head_ref }}
          STATUS: ${{ steps.status.outputs.status }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.notion.com/v1/databases/$NOTION_DATABASE_ID/query" \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{\"filter\": {\"property\": \"Branch\", \"rich_text\": {\"equals\": \"$BRANCH\"}}}")

          echo "Query response: $RESPONSE"

          PAGE_ID=$(echo $RESPONSE | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          results = data.get('results', [])
          print(results[0]['id'] if results else '')
          ")

          if [ -z "$PAGE_ID" ]; then
            echo "No row found for branch: $BRANCH"
            exit 1
          fi

          echo "Found page: $PAGE_ID"

          UPDATE=$(curl -s -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{\"properties\": {\"Status\": {\"multi_select\": [{\"name\": \"$STATUS\"}]}}}")

          echo "Update response: $UPDATE"
          echo "Done: $BRANCH -> $STATUS"